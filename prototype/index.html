<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Link the Css style sheet -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://use.typekit.net/arl2ivw.css">

<body>

    <main class="content">
        <div class="menu">
            <div class="opacity">

        <div class="promo">

        <div class="flavour">
            <div class="opacity3">

        </div>
        <div class="shapes">
            <div class="opacity4">

            </div>

    <footer>
        <h3>&copy; Copyright Blue Ice 2021</h3>
    </footer>
