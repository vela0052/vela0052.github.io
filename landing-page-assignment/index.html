<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/7f4096dde2.js" crossorigin="anonymous"></script>
    <title>Dash Drive with us</title>
</head>
<body>
    <header>
        <img src="images/logo/logo.png" alt="logo">
    </header>
    <main>
        <section class="info">
            <h1>Want to be your own boss?</h1>
            <p>
                Start today and make up to $30/hr driving your own vehicle with Dash!
            </p>
        </section>
        <div class="scooter">
            <img src="images/bg-image/scooter.svg" alt="scooter">
        </div>
        <section class="form">
            <h2>Apply now</h2>
            <p>Enter your info below to get started</p>
            <form action="submit">
                <div class="firstname"><input type="text" name="firstname" id="firstname" placeholder="First Name"></div>
                <div class="lastname"><input type="text" name="lastname" id="lastname" placeholder="Last Name"></div>
                <div class="phone"><input type="text" name="phone" id="phone" placeholder="Phone number"></div>
                <div class="mail"><input type="text" name="email" id="email" placeholder="Email"></div>
                <div>
                    <input type="checkbox" name="agreement" id="agreement">
                    <label for="#">I agree to dash terms</label>
                </div>
                <button type="submit">DRIVE WITH US</button>

            </form>
        </section>
    </main>
    <footer>
        <div class="fform">
            <h3>See how much you can earn with Dash.</h3>
            <p>how many hours do you want to drive with us this week?</p>
            <form action="calculator">
                <input type="number" name="hours" id="hours" placeholder="Hours">
                <input type="text" name="city" id="city" placeholder="City">
                <button type="submit">CALCULATE</button>
            </form>
        </div>
        <div class="social">
            <a href="https://www.facebook.com/"><img src="images/icons/facebook.svg" alt="facebook"></a>
            <a href="https://instagram.com/"><img src="images/icons/instagram.svg" alt="instagram"></a>
            <a href="https://twitter.com/"><img src="images/icons/twitter.svg" alt="twitter"></a>
            <a href="https://www.linkedin.com/"><img src="images/icons/linkedin.svg" alt="linkedin"></a>

        </div>
    </footer>
</body>
</html>
